name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# A new push to a branch makes the run already in flight pointless.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      # Installs the exact pnpm from package.json's `packageManager` field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          # Matches the `volta.node` pin; `engines` also allows 22 and 24.
          node-version: '26.5.0'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
