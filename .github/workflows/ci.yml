name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# A new push to a branch makes the run already in flight pointless.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · check · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      # Installs the exact pnpm from package.json's `packageManager` field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # Matches the `volta.node` pin; `engines` also allows 22 and 24.
          node-version: '26.5.0'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Check i18n · fonts · ipc
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  smoke:
    name: UI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26.5.0'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      # `window.electron` is typed via main/preload → main/generated/ipc-bridge.ts
      # (gitignored). Without this, ng serve hits noImplicitAny on bridge callbacks.
      - name: Generate IPC bridge
        run: pnpm gen:ipc
      - name: Install Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Smoke
        run: pnpm smoke

  desktop:
    name: Windows desktop package
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26.5.0'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Package unpacked application
        run: pnpm pack:win
