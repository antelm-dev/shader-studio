name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# A new push to a branch makes the run already in flight pointless.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      # Installs the exact pnpm from package.json's `packageManager` field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          # Matches the `volta.node` pin; `engines` also allows 22 and 24.
          node-version: '26.5.0'
          cache: pnpm

      - name: Check out local Electron libraries
        run: |
          mkdir -p ../electron-libs
          git clone --depth 1 https://github.com/antelm-dev/electron-ipc-module.git ../electron-libs/ipc-module
          git clone --depth 1 https://github.com/antelm-dev/electron-run.git ../electron-libs/electron-run

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  desktop:
    name: Windows desktop package
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '26.5.0'
          cache: pnpm
      - name: Check out local Electron libraries
        shell: bash
        run: |
          mkdir -p ../electron-libs
          git clone --depth 1 https://github.com/antelm-dev/electron-ipc-module.git ../electron-libs/ipc-module
          git clone --depth 1 https://github.com/antelm-dev/electron-run.git ../electron-libs/electron-run
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Package unpacked application
        run: pnpm pack:win
