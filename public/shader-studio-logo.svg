<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" role="img" aria-labelledby="title desc">
  <title id="title">Shader Studio</title>
  <desc id="desc">Three colorful abstract waves with pixel fragments.</desc>

  <!-- Upper wave: a broad crest breaking into shader-like pixels. -->
  <path
    fill="#2EDBC3"
    stroke="#09111F"
    stroke-width="16"
    stroke-linejoin="round"
    d="M70 249C86 143 170 72 270 72c45 0 87 13 122 36v66c0 20 9 32 27 39v35c-30-5-52-20-68-45-22-35-55-53-96-53-59 0-107 35-132 91-17-7-35-5-53 8Z"
  />

  <!-- Cream negative-space curl keeps the mark lively without spelling an S. -->
  <path
    fill="#FFF4D6"
    stroke="#09111F"
    stroke-width="16"
    stroke-linejoin="round"
    d="M294 139c-48 0-86 39-86 87 0 54 44 98 102 98 15 0 29-3 42-9-48-3-80-31-80-69 0-30 19-54 48-60-5-28-14-47-26-47Z"
  />

  <!-- Middle wave. -->
  <path
    fill="#8447F4"
    stroke="#09111F"
    stroke-width="16"
    stroke-linejoin="round"
    d="M58 338c8-77 53-124 108-124 38 0 70 21 101 46 32 26 59 44 94 44 34 0 62-12 91-36-5 76-49 124-107 124-42 0-75-22-106-47-31-24-57-41-89-41-36 0-65 14-92 34Z"
  />

  <!-- Lower wave. -->
  <path
    fill="#FF625D"
    stroke="#09111F"
    stroke-width="16"
    stroke-linejoin="round"
    d="M72 425c18-49 51-75 92-75 38 0 70 19 101 40 35 24 70 46 114 46 35 0 67-12 94-38-15 71-67 108-132 108-52 0-91-24-126-47-30-20-57-37-86-37-21 0-40 7-57 19v-16Z"
  />

  <!-- Pixel fragments: square, flat and intentionally sparse for favicon legibility. -->
  <g stroke="#09111F" stroke-width="10" stroke-linejoin="round">
    <rect x="405" y="92" width="31" height="31" rx="5" fill="#FFF4D6" />
    <rect x="433" y="139" width="27" height="27" rx="5" fill="#2EDBC3" />
    <rect x="390" y="181" width="29" height="29" rx="5" fill="#FFF4D6" />
    <rect x="443" y="226" width="27" height="27" rx="5" fill="#8447F4" />
    <rect x="410" y="265" width="31" height="31" rx="5" fill="#8447F4" />
    <rect x="457" y="309" width="27" height="27" rx="5" fill="#FF625D" />
  </g>
</svg>
