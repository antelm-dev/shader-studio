<!-- The shader is the page: everything below is painted on top of it. -->
<app-shader-canvas />
<router-outlet />

<div class="shell">
  @if (desktop.available) {
    <app-titlebar />
  }

  <mat-toolbar class="toolbar">
    <button
      matIconButton
      type="button"
      matTooltip="Toggle the shader browser"
      aria-label="Toggle the shader browser"
      [attr.aria-expanded]="drawerOpen()"
      (click)="toggleBrowser()"
    >
      <mat-icon>menu</mat-icon>
    </button>

    <span class="brand" aria-label="Shader Studio">
      <img class="brand-logo" src="shader-studio-logo.png" alt="" width="32" height="32" />
      <span class="brand-title">Shader Studio</span>
    </span>

    @if (store.record(); as shader) {
      <span
        class="shader-name"
        [title]="shader.description + ' — right-click for actions'"
        [matContextMenuTriggerFor]="shaderMenu"
      >
        {{ shader.name }}
      </span>
      @if (store.dirty()) {
        <span class="dot" matTooltip="Unsaved changes" aria-label="Unsaved changes">•</span>
      }

      <mat-menu #shaderMenu="matMenu">
        <button mat-menu-item type="button" (click)="workspace.renameShader(shader.id, shader.name)">
          <mat-icon>edit</mat-icon>
          <span>Rename</span>
        </button>
        <button
          mat-menu-item
          type="button"
          (click)="workspace.duplicateShader(shader.id, shader.name)"
        >
          <mat-icon>content_copy</mat-icon>
          <span>Duplicate</span>
        </button>
        <button mat-menu-item type="button" (click)="exportCurrent()">
          <mat-icon>download</mat-icon>
          <span>Export</span>
        </button>
        <button mat-menu-item type="button" (click)="workspace.deleteShader(shader.id, shader.name)">
          <mat-icon>delete</mat-icon>
          <span>Delete</span>
        </button>
      </mat-menu>
    }

    <span class="spacer"></span>

    <input
      #fileInput
      type="file"
      class="file-input"
      accept="application/json,.json"
      tabindex="-1"
      aria-hidden="true"
      (change)="onFilePicked($event)"
    />

    <button
      matIconButton
      type="button"
      matTooltip="More actions"
      aria-label="More actions"
      [matMenuTriggerFor]="moreMenu"
    >
      <mat-icon>more_vert</mat-icon>
    </button>

    <mat-menu #moreMenu="matMenu">
      <button mat-menu-item type="button" (click)="toggle('guiVisible')">
        <mat-icon>tune</mat-icon>
        <span>{{ preferences.value().guiVisible ? 'Hide controls' : 'Show controls' }}</span>
        <span class="menu-hint">H</span>
      </button>
      <button mat-menu-item type="button" (click)="toggle('editorOpen')">
        <mat-icon>code</mat-icon>
        <span>{{ preferences.value().editorOpen ? 'Hide editor' : 'Show editor' }}</span>
      </button>
      <button mat-menu-item type="button" (click)="toggleColorScheme()">
        <mat-icon>{{ darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span>{{ darkMode() ? 'Light theme' : 'Dark theme' }}</span>
      </button>

      <mat-divider />

      <button mat-menu-item type="button" (click)="pickFile('rename')">
        <mat-icon>upload</mat-icon>
        <span>Import…</span>
      </button>
      <button mat-menu-item type="button" (click)="pickFile('overwrite')">
        <mat-icon>upload_file</mat-icon>
        <span>Import and replace…</span>
      </button>
      <button mat-menu-item type="button" [disabled]="!store.record()" (click)="exportCurrent()">
        <mat-icon>download</mat-icon>
        <span>Export this shader</span>
      </button>
      <button mat-menu-item type="button" (click)="workspace.exportAll()">
        <mat-icon>library_books</mat-icon>
        <span>Export all shaders</span>
      </button>
    </mat-menu>

    <button
      matButton="filled"
      type="button"
      class="save"
      matTooltip="Save the source and config (Ctrl+S)"
      [disabled]="!store.dirty() || store.saving() || !store.configValid()"
      (click)="store.save()"
    >
      <mat-icon>save</mat-icon>
      Save
    </button>

    @if (store.loading() || store.saving()) {
      <mat-progress-bar class="loading" mode="indeterminate" aria-label="Working" />
    }
  </mat-toolbar>

  <mat-sidenav-container class="body" [hasBackdrop]="isHandset()">
    <mat-sidenav
      class="drawer"
      [mode]="isHandset() ? 'over' : 'side'"
      [opened]="drawerOpen()"
      (closedStart)="closeBrowser()"
    >
      <app-shader-browser />
    </mat-sidenav>

    <mat-sidenav-content class="content">
      <div class="stage"></div>

      @if (preferences.value().guiVisible) {
        <aside class="controls" aria-label="Shader controls">
          <app-preset-panel class="presets" />
          <app-gui-panel class="gui" />
        </aside>
      }

      @if (preferences.value().editorOpen) {
        <app-editor-shell class="editor" />
      }
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
